<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- AUTH BAR -->
  <div id="authBar">
    <span id="authStatus"></span>
    <button onclick="showLogin()">Zaloguj</button>
    <button onclick="showRegister()">Rejestracja</button>
  </div>

  <div id="authModal" class="hidden">
    <div id="authModalContent">
      <h3 id="authModalTitle"></h3>
      <input id="authUsername" placeholder="Login">
      <input id="authPassword" type="password" placeholder="Hasło">
      <button onclick="submitAuth()">OK</button>
      <button onclick="closeAuth()">Anuluj</button>
    </div>
  </div>

  <!-- MENU GÓRNE -->
  <header id="menu">
    <div id="menu-left">
      <span id="playerName">Nazwa</span>
      <span id="coinsLabel">Coiny:</span>
      <span id="coinsDisplay">0</span>
    </div>
    <div id="menu-buttons">
      <button onclick="startQuiz()">NAUKA</button>
      <button onclick="openPage('profile')">PROFIL</button>
      <button onclick="openPage('shop')">SKLEP</button>
      <button onclick="openPage('inventory')">EKWIPUNEK</button>
      <button onclick="openPage('settings')">USTAW</button>
      <button onclick="openPage('tasks')">ZADANIA</button>
    </div>
  </header>

  <main>
    <!-- QUIZ -->
    <section id="quiz" class="page hidden">
      <h2>Quiz</h2>
      <div id="quizContainer">
        <p id="quizQuestion"></p>
        <div id="quizAnswers"></div>
        <button id="nextQuestionBtn" onclick="nextQuestion()" class="hidden">Następne pytanie</button>
      </div>
    </section>

    <!-- NAGRODY -->
    <section id="rewards" class="page hidden">
      <h2>Wynik</h2>
      <p id="rewardsTitle"></p>
      <p id="rewardsCoins"></p>
      <button onclick="openPage('menuDummy')">OK</button>
    </section>

    <!-- PROFIL -->
    <section id="profile" class="page hidden">
      <h2>Profil</h2>

      <div id="profileCard">
        <div id="profileAvatarWrapper">
          <div id="profileFrame"></div>
          <div id="profileAvatar">Avatar</div>
        </div>
        <div id="profileNickWrapper">
          <div id="profileNick">Nazwa</div>
          <div id="xpBarWrapper">
            <div id="xpLabel"></div>
            <div id="xpBar">
              <div id="xpFill"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="profile-section">
        <h3>Ramki</h3>
        <div id="profileFrames" class="profile-list"></div>
      </div>

      <div class="profile-section">
        <h3>Kolory nicku</h3>
        <div id="profileNickColors" class="profile-list"></div>
      </div>
    </section>

    <!-- SKLEP -->
    <section id="shop" class="page hidden">
      <h2>Sklep</h2>

      <div class="shop-category">
        <h3>Ramki</h3>
        <div id="shopFrames" class="shop-list"></div>
      </div>

      <div class="shop-category">
        <h3>Tła</h3>
        <div id="shopBackgrounds" class="shop-list"></div>
      </div>

      <div class="shop-category">
        <h3>Kolory nicku</h3>
        <div id="shopNickColors" class="shop-list"></div>
      </div>

      <div class="shop-category">
        <h3>Skrzynki</h3>
        <div id="shopCrates" class="shop-list"></div>
      </div>
    </section>

    <!-- EKWIPUNEK -->
    <section id="inventory" class="page hidden">
      <h2>Ekwipunek</h2>
      <div class="inventory-section">
        <h3>Skrzynki</h3>
        <div id="inventoryCrates" class="inventory-list"></div>
      </div>
    </section>

    <!-- USTAWIENIA -->
    <section id="settings" class="page hidden">
      <h2>Ustawienia</h2>
      <div class="settings-section">
        <h3>Tła strony</h3>
        <div id="settingsBackgrounds" class="settings-list"></div>
      </div>
    </section>

    <!-- ZADANIA -->
    <section id="tasks" class="page hidden">
      <h2>Zadania dzienne</h2>
      <div id="tasksList"></div>
    </section>

    <!-- PUSTA STRONA MENU (do powrotu) -->
    <section id="menuDummy" class="page hidden">
      <h2>Wybierz tryb z góry</h2>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
